name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build Linux
        run: go build -o /dev/null .

      - name: Build Windows (cross-compile)
        run: GOOS=windows GOARCH=amd64 go build -o /dev/null .

      - name: Run tests
        run: go test ./...
