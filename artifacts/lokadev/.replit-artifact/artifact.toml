kind = "web"
previewPath = "/"
title = "LokaDev"
version = "1.0.0"
id = "artifacts/lokadev"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20815

[services.development]
run = "pnpm --filter @workspace/lokadev run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lokadev", "run", "build" ]
publicDir = "artifacts/lokadev/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20815"
BASE_PATH = "/"
